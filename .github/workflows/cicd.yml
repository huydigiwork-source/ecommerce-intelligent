name: CI/CD - Upload to HF Space & Dataset

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.check.outputs.frontend }}
      backend_changed: ${{ steps.check.outputs.backend }}
      data_changed: ${{ steps.check.outputs.data }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check changed files (git)
        id: check
        run: |
          echo "frontend=false" >> $GITHUB_OUTPUT
          echo "backend=false" >> $GITHUB_OUTPUT
          echo "data=false" >> $GITHUB_OUTPUT
          
          # Get list of all files in last commit
          echo "📋 Getting files from HEAD commit..."
          COMMIT_FILES=$(git log -1 --name-only --pretty=format: HEAD)
          
          echo "📋 Files in commit:"
          echo "$COMMIT_FILES"
          echo ""
          
          # Check frontend/
          if echo "$COMMIT_FILES" | grep -q "^frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
            echo "✅ Frontend changed"
          fi
          
          # Check backend/, app.py, requirements.txt, Dockerfile
          if echo "$COMMIT_FILES" | grep -qE "^backend/|^app\.py$|^requirements\.txt$|^Dockerfile$"; then
            echo "backend=true" >> $GITHUB_OUTPUT
            echo "✅ Backend changed"
          fi
          
          # Check data/
          if echo "$COMMIT_FILES" | grep -q "^data/"; then
            echo "data=true" >> $GITHUB_OUTPUT
            echo "✅ Data changed"
          fi