name: CI/CD - Upload to HF Space & Dataset

on:
  push:
    branches:
      - main
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  detect-changes:
    runs-on: ubuntu-latest
    outputs:
      frontend_changed: ${{ steps.changes.outputs.frontend }}
      backend_changed: ${{ steps.changes.outputs.backend }}
      data_changed: ${{ steps.changes.outputs.data }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Detect changed files
        id: changes
        run: |
          echo "frontend=false" >> $GITHUB_OUTPUT
          echo "backend=false" >> $GITHUB_OUTPUT
          echo "data=false" >> $GITHUB_OUTPUT
          
          if git diff --name-only HEAD~1 HEAD | grep -q "^frontend/"; then
            echo "frontend=true" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD~1 HEAD | grep -q "^backend/"; then
            echo "backend=true" >> $GITHUB_OUTPUT
          fi
          
          if git diff --name-only HEAD~1 HEAD | grep -q "^data/"; then
            echo "data=true" >> $GITHUB_OUTPUT
          fi

  run-scraper:
    runs-on: ubuntu-latest
    outputs:
      csv_created: ${{ steps.scraper.outputs.csv_created }}
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install huggingface_hub
          pip install kaggle

      - name: Setup Kaggle API (kaggle.json method)
        run: |
          echo "✅ Setting up Kaggle API via kaggle.json..."
          mkdir -p ~/.config/kaggle
          cp ${{ github.workspace }}/kaggle.json ~/.config/kaggle/kaggle.json
          chmod 600 ~/.config/kaggle/kaggle.json
          echo "✅ Kaggle API setup complete"

      - name: Run scraper
        id: scraper
        run: |
          echo "🚀 Running scraper..."
          mkdir -p data
          python backend/scraper.py
          if [ -f "data/ecommerce_products.csv" ]; then
            echo "csv_created=true" >> $GITHUB_OUTPUT
            echo "✅ CSV created successfully"
            ls -lh data/
          else
            echo "csv_created=false" >> $GITHUB_OUTPUT
            echo "❌ CSV not created"
          fi

      - name: Upload CSV artifact
        if: ${{ steps.scraper.outputs.csv_created == 'true' }}
        uses: actions/upload-artifact@v4
        with:
          name: csv-data
          path: data/ecommerce_products.csv

  upload-to-dataset:
    needs: [detect-changes, run-scraper]
    if: ${{ needs.detect-changes.outputs.data == 'true' || needs.run-scraper.outputs.csv_created == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Login to Hugging Face
        run: hf auth login --token ${{ secrets.HF_TOKEN }}

      - name: Download CSV artifact
        if: ${{ needs.run-scraper.outputs.csv_created == 'true' }}
        uses: actions/download-artifact@v4
        with:
          name: csv-data
          path: data

      - name: Run scraper (if data changed)
        if: ${{ needs.detect-changes.outputs.data == 'true' }}
        run: |
          echo "🚀 Running scraper to generate CSV..."
          pip install -r requirements.txt
          pip install kaggle
          mkdir -p data
          python backend/scraper.py

      - name: Upload data to HF Dataset
        run: |
          echo "📤 Uploading data to HF Dataset..."
          if [ -f "data/ecommerce_products.csv" ]; then
            hf upload ${{ secrets.HF_DATASET_ID }} data/ecommerce_products.csv data/ecommerce_products.csv --repo-type dataset
            echo "✅ Data uploaded successfully"
            ls -lh data/
          else
            echo "❌ No data files found"
            ls -lh data/
            exit 1
          fi

  upload-to-space:
    needs: detect-changes
    if: ${{ needs.detect-changes.outputs.frontend == 'true' || needs.detect-changes.outputs.backend == 'true' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install huggingface_hub
        run: pip install huggingface_hub

      - name: Login to Hugging Face
        run: hf auth login --token ${{ secrets.HF_TOKEN }}

      - name: Upload frontend to HF Space
        if: ${{ needs.detect-changes.outputs.frontend == 'true' }}
        run: |
          echo "📤 Uploading frontend to HF Space..."
          if [ -d "frontend" ]; then
            hf upload ${{ secrets.HF_SPACE_ID }} frontend frontend/ --repo-type space
          fi

      - name: Upload backend to HF Space
        if: ${{ needs.detect-changes.outputs.backend == 'true' }}
        run: |
          echo "📤 Uploading backend to HF Space..."
          if [ -d "backend" ]; then
            hf upload ${{ secrets.HF_SPACE_ID }} backend backend/ --repo-type space
          fi